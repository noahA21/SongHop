services:
  postgres:
    image: postgres:16-alpine
    container_name: songhop_postgres
    environment:
      - POSTGRES_DB=songhop_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: songhop_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: